<!-- @dsCard group="Foundations" name="Typography" subtitle="Inter type scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-sans); background: var(--page-bg); color: var(--text); margin: 0; padding: var(--sp-6); }
  .meta { color: var(--text-muted); font-size: var(--fs-small); font-variant-numeric: tabular-nums; }
  .specimen { border-bottom: 1px solid var(--border); padding: var(--sp-3) 0; }
  .hero  { font-size: var(--fs-hero); font-weight: 700; line-height: var(--lh-tight); }
  .h2    { font-size: var(--fs-h2);   font-weight: 600; }
  .h3    { font-size: var(--fs-h3);   font-weight: 600; }
  .body  { font-size: var(--fs-body); font-weight: 400; line-height: var(--lh-body); }
  .small { font-size: var(--fs-small);font-weight: 500; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="specimen"><div class="hero">What drives phone price?</div><div class="meta">Hero / 2rem / 700</div></div>
  <div class="specimen"><div class="h2">Why Price?</div><div class="meta">H2 / 1.4rem / 600</div></div>
  <div class="specimen"><div class="h3">Best Value Phones</div><div class="meta">H3 / 1.1rem / 600</div></div>
  <div class="specimen"><div class="body">Specs explain only about a quarter of price; the rest is brand and positioning.</div><div class="meta">Body / 1rem / 400 / 1.5</div></div>
  <div class="specimen"><div class="small">OUT-OF-FOLD RANDOM-FOREST RESIDUAL</div><div class="meta">Small / 0.85rem / 500 / muted</div></div>
</body>
</html>
